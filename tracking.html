<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#d6342b" />
  <title>Track Order — Sup Tulang ZZ</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <a class="back" href="menu.html">←</a>
      <div class="title">Order Status</div>
      <a class="cart-link" href="cart.html">🛒<span class="cart-badge">0</span></a>
    </header>

    <main class="page" id="page"></main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script>
  const pageEl = document.getElementById("page");

  // Steps definition per order type
  const STEPS_WALKIN = [
    { key: "pending",   label: "Order Received",  sub: "Sent to the kitchen",        icon: "📝" },
    { key: "preparing", label: "In Progress",      sub: "Your food is being cooked",  icon: "👨‍🍳" },
    { key: "ready",     label: "Ready",            sub: "Ready to be served",         icon: "🔔" },
    { key: "completed", label: "Completed",        sub: "Enjoy your meal!",           icon: "✅" },
  ];

  const STEPS_DELIVERY = [
    { key: "pending",   label: "Order Received",   sub: "We've received your order",       icon: "📝" },
    { key: "preparing", label: "In Progress",       sub: "Your food is being prepared",     icon: "👨‍🍳" },
    { key: "ready",     label: "Ready",             sub: "Your order is packed",            icon: "📦" },
    { key: "completed", label: "Out for Delivery",  sub: "Your order is on the way!",       icon: "🛵" },
    { key: "arrived",   label: "Arrived",           sub: "Your order has been delivered!",  icon: "✅" },
  ];

  const STEPS_PICKUP = [
    { key: "pending",   label: "Order Received",   sub: "We've received your order",        icon: "📝" },
    { key: "preparing", label: "In Progress",       sub: "Your food is being prepared",      icon: "👨‍🍳" },
    { key: "ready",     label: "Ready to Pick Up",  sub: "Come collect your order!",         icon: "🔔" },
    { key: "completed", label: "Complete",          sub: "Thank you for your order!",        icon: "✅" },
  ];

  const ETA = {
    walkin: {
      pending:   "Waiting for the kitchen to accept…",
      preparing: "Estimated 10–15 min",
      ready:     "Please wait to be served 🎉",
      completed: "Thank you for dining with us!",
    },
    delivery: {
      pending:   "We've received your order!",
      preparing: "Estimated 20–30 min",
      ready:     "Your order is being packed…",
      completed: "Your order is on the way! 🛵",
      arrived:   "Your order has arrived. Enjoy! 🎉",
    },
    pickup: {
      pending:   "We've received your order!",
      preparing: "Estimated 15–20 min",
      ready:     "Your order is ready — come pick it up! 🔔",
      completed: "Thank you! See you again 😊",
    },
  };

  function fmtTime(ts) {
    return new Date(ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  // Server datetime ("2026-06-30 18:09:37") or a ms number → ms (cross-browser).
  function tsToMs(s) {
    if (typeof s === "number") return s;
    if (!s) return Date.now();
    const t = new Date(String(s).replace(" ", "T")).getTime();
    return isNaN(t) ? Date.now() : t;
  }

  function getOrderType(order) {
    if (order.order_type === "online" || order.delivery_type) {
      return order.delivery_type === "pickup" ? "pickup" : "delivery";
    }
    return "walkin";
  }

  function getSteps(orderType) {
    if (orderType === "delivery") return STEPS_DELIVERY;
    if (orderType === "pickup")   return STEPS_PICKUP;
    return STEPS_WALKIN;
  }

  // Gather every order the customer placed (newest first). Merge the single
  // "current"/"online" keys in for back-compat, then persist the merged list.
  function collectOrders() {
    const list = Orders.list();
    const cur  = Order.current();
    if (cur && cur.id && !list.some(o => o.id === cur.id)) list.push(cur);
    try {
      const o = JSON.parse(localStorage.getItem("sz_online_order") || "null");
      if (o && o.id && !list.some(x => x.id === o.id)) {
        list.push({
          id: o.id, table: null, customerName: o.customer_name,
          items: o.items || [], subtotal: o.subtotal, tax: o.tax, total: o.total,
          status: o.status || "pending", order_type: "online",
          delivery_type: o.delivery_type || "delivery",
          placedAt: o.placedAt || Date.now(),
          history: o.history || [{ status: "pending", at: Date.now() }],
          remote: true,
        });
      }
    } catch (e) {}
    Orders.save(list);
    return list.slice().sort((a, b) => (b.placedAt || 0) - (a.placedAt || 0));
  }

  // Keep the single-order keys in sync so the home/menu "Track" links stay correct.
  function syncSingles(o) {
    try {
      const cur = Order.current();
      if (cur && cur.id === o.id && cur.status !== o.status) {
        cur.status = o.status; cur.history = o.history;
        localStorage.setItem("sz_current_order", JSON.stringify(cur));
      }
    } catch (e) {}
    try {
      const oo = JSON.parse(localStorage.getItem("sz_online_order") || "null");
      if (oo && oo.id === o.id && oo.status !== o.status) {
        oo.status = o.status;
        localStorage.setItem("sz_online_order", JSON.stringify(oo));
      }
    } catch (e) {}
  }

  function render() {
    const orders = collectOrders();

    if (!orders.length) {
      pageEl.innerHTML = `
        <div class="empty">
          <div class="big">🧾</div>
          <p>No active order yet.</p>
          <a class="btn" href="menu.html" style="max-width:240px;margin:14px auto 0">Start Ordering</a>
        </div>`;
      return;
    }

    const heading = orders.length > 1
      ? `<p style="text-align:center;color:var(--muted);font-size:13px;margin:0 0 14px">
           You have <strong>${orders.length}</strong> orders at this table — newest first.
         </p>`
      : "";

    pageEl.innerHTML = heading
      + orders.map(renderCard).join('<div style="height:22px"></div>')
      + `<div style="height:18px"></div><a class="btn secondary" href="menu.html">＋ Add More Items</a>`;

    // Wire up the per-order demo "advance status" buttons (local orders only).
    orders.forEach(o => {
      const b = document.getElementById("sim-" + o.id);
      if (b) b.addEventListener("click", () => { advanceLocal(o.id); render(); });
    });
  }

  function advanceLocal(id) {
    const list = Orders.list();
    const o = list.find(x => x.id === id);
    if (!o) return;
    const flow = ["pending", "preparing", "ready", "completed"];
    const i = flow.indexOf(o.status);
    if (i < flow.length - 1) {
      o.status = flow[i + 1];
      (o.history = o.history || []).push({ status: o.status, at: Date.now() });
      Orders.save(list);
      syncSingles(o);
    }
  }

  // Build the card (status + timeline + summary) for a single order.
  function renderCard(order) {
    const orderType = getOrderType(order);
    const STEPS     = getSteps(orderType);
    const etaMap    = ETA[orderType];

    // Map status — "arrived" only exists in delivery
    let displayStatus = order.status;
    if (orderType !== "delivery" && displayStatus === "arrived") displayStatus = "completed";

    const curIdx = STEPS.findIndex(s => s.key === displayStatus);
    const safeIdx = curIdx === -1 ? 0 : curIdx;

    const etaText = etaMap[displayStatus] || etaMap["pending"];

    let timeline = "";
    STEPS.forEach((s, i) => {
      const done   = i < safeIdx;
      const active = i === safeIdx;
      const at     = (order.history || []).find(h => h.status === s.key);
      timeline += `
        <li class="${done ? "done" : ""} ${active ? "active" : ""}">
          <div class="dot">${done ? "✓" : s.icon}</div>
          <div class="tl-info">
            <strong>${s.label}</strong>
            <span>${at ? fmtTime(at.at) + " · " : ""}${s.sub}</span>
          </div>
        </li>`;
    });

    let recap = "";
    (order.items || []).forEach(it => {
      const meta = [
        it.variant ? it.variant.name : (it.variant_name || null),
        ...((it.addons || []).map(a => "+" + a.name))
      ].filter(Boolean).join(", ");
      recap += `
        <div class="recap-row">
          <span><span class="q">${it.qty}×</span> ${it.name}${meta ? ` <span class="q">(${meta})</span>` : ""}</span>
          <span>${formatRM((it.unit_price || Cart.unitPrice(it)) * it.qty)}</span>
        </div>`;
    });

    const tableLabel = order.table && order.table !== "—"
      ? "Table " + order.table + " · "
      : (orderType === "delivery" ? "Delivery · " : orderType === "pickup" ? "Self Pickup · " : "");

    const isComplete = displayStatus === "completed" || displayStatus === "arrived";

    // Payment line (dine-in orders carry order.payment; paid online or at counter)
    const pay = order.payment;
    const paidLike = pay && (pay.status === "paid" || pay.status === "success");
    const payLabel = pay
      ? (paidLike
          ? (pay.method === "counter" ? "✅ Paid (at counter)" : "✅ Paid" + (pay.detail ? " · " + pay.detail : ""))
          : "🧾 Pay at counter")
      : "";

    return `
      <div class="order-card">
        <div class="order-no">Order Number</div>
        <div class="order-id">#${order.id}</div>
        <div class="status-pill ${displayStatus}">${STEPS[safeIdx].label}</div>
        <div class="eta">${etaText}</div>
        <div style="font-size:13px;color:var(--muted);margin-top:6px">
          ${tableLabel}Placed at ${fmtTime(order.placedAt)}
          ${order.customerName ? " · " + order.customerName : ""}
        </div>
        ${payLabel ? `<div style="font-size:13px;font-weight:700;margin-top:6px;color:${paidLike ? "var(--green)" : "#e65100"}">${payLabel}</div>` : ""}
      </div>

      <ul class="timeline">${timeline}</ul>

      <div style="height:16px"></div>

      <div class="recap">
        <h3>Order Summary</h3>
        ${recap}
        <div class="recap-row" style="margin-top:8px;border-top:1px dashed var(--line);padding-top:10px">
          <span class="q">Subtotal</span><span>${formatRM(order.subtotal)}</span>
        </div>
        <div class="recap-row"><span class="q">SST</span><span>${formatRM(order.tax)}</span></div>
        <div class="recap-row" style="font-weight:800"><span>Total</span><span>${formatRM(order.total)}</span></div>
      </div>

      ${!isComplete
        ? (order.remote ? "" : `<div style="text-align:center"><button class="btn ghost" id="sim-${order.id}" style="margin-top:10px">▶︎ Demo: advance status</button></div>`)
        : `<p style="text-align:center;color:var(--green);font-weight:700;margin-top:12px">${orderType === "delivery" ? "Order delivered ✅" : orderType === "pickup" ? "Order complete ✅" : "Order completed ✅"}</p>`}
    `;
  }

  render();

  // --- Live status: poll every remote order; demo-advance local (offline) ones ---
  // An order is fully "settled" once cooking is done AND payment is in.
  function settled(o) {
    const statusDone = o.status === "completed" || o.status === "arrived";
    const payDone = !o.payment || o.payment.status === "paid" || o.payment.status === "success";
    return statusDone && payDone;
  }

  async function pollRemoteOnce() {
    const list = Orders.list();
    let changed = false;
    for (const o of list) {
      if (!o.remote || settled(o)) continue;
      try {
        const r = await fetch("api/order_status.php?id=" + encodeURIComponent(o.id), { cache: "no-store" });
        if (r.ok) {
          const j = await r.json();
          if (j && j.status && j.status !== o.status) { o.status = j.status; changed = true; }

          // Adopt the server's real status history (oldest first) when it grows.
          if (j && Array.isArray(j.history)) {
            const mapped = j.history.map(h => ({ status: h.status, at: tsToMs(h.at) }));
            if (mapped.length !== (o.history ? o.history.length : 0)) changed = true;
            if (mapped.length) o.history = mapped;
          }

          // Reflect a "pay at counter" order being marked paid by staff.
          if (j && j.payment && o.payment && j.payment.status && j.payment.status !== o.payment.status) {
            o.payment.status = j.payment.status;
            changed = true;
          }
        }
      } catch (e) { /* keep trying */ }
    }
    if (changed) { Orders.save(list); list.forEach(syncSingles); render(); }
    return list.some(o => o.remote && !settled(o));
  }

  pollRemoteOnce().then(stillActive => {
    if (!stillActive) return;
    const poll = setInterval(async () => {
      if (!(await pollRemoteOnce())) clearInterval(poll);
    }, 4000);
  });

  if (Orders.list().some(o => !o.remote && o.status !== "completed")) {
    const auto = setInterval(() => {
      const list = Orders.list();
      let changed = false;
      list.forEach(o => {
        if (o.remote || o.status === "completed") return;
        const flow = ["pending", "preparing", "ready", "completed"];
        const i = flow.indexOf(o.status);
        if (i < flow.length - 1) {
          o.status = flow[i + 1];
          (o.history = o.history || []).push({ status: o.status, at: Date.now() });
          changed = true;
        }
      });
      if (changed) { Orders.save(list); list.forEach(syncSingles); render(); }
      if (!list.some(o => !o.remote && o.status !== "completed")) clearInterval(auto);
    }, 8000);
  }
  </script>
</body>
</html>
