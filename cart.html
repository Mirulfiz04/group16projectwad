<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#d6342b" />
  <title>My Cart — Sup Tulang ZZ</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <a class="back" href="menu.html">←</a>
      <div class="title">My Cart <small id="tableSmall">Table —</small></div>
      <a class="cart-link" href="cart.html">🛒<span class="cart-badge">0</span></a>
    </header>

    <main class="page" id="page">
      <!-- filled by JS -->
    </main>

    <!-- Sticky checkout footer (hidden when cart empty) -->
    <div class="sticky-footer" id="footer" style="display:none">
      <button class="btn" id="placeBtn">Place Order · <span id="footTotal">RM 0.00</span></button>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script>
  document.getElementById("tableSmall").textContent = Table.get() ? ("Table " + Table.get()) : "Walk-in";

  const pageEl   = document.getElementById("page");
  const footerEl = document.getElementById("footer");

  function lineMeta(it) {
    const parts = [];
    if (it.variant) parts.push(it.variant.name);
    (it.addons || []).forEach(a => parts.push("+ " + a.name));
    return parts.join(" · ");
  }

  function render() {
    const items = Cart.get();

    if (!items.length) {
      pageEl.innerHTML = `
        <div class="empty">
          <div class="big">🛒</div>
          <p>Your cart is empty.</p>
          <a class="btn" href="menu.html" style="max-width:240px;margin:14px auto 0">Browse the Menu</a>
        </div>`;
      footerEl.style.display = "none";
      return;
    }

    const isOnline = !Table.get();

    let html = isOnline
      ? `<div class="note-banner">🌐 Online order. Please confirm your items before checkout.</div>`
      : `<div class="note-banner">🍽️ Dine-in order for <strong>Table ${Table.get()}</strong>. Please confirm your items before placing the order.</div>`;

    items.forEach(it => {
      const sig = Cart.signature(it);
      const meta = lineMeta(it);
      html += `
        <div class="cart-item" data-sig="${encodeURIComponent(sig)}">
          <div class="thumb">${thumbHTML(it.img, it.emoji)}</div>
          <div class="ci-info">
            <div class="ci-name">${it.name}</div>
            ${meta ? `<div class="ci-meta">${meta}</div>` : ""}
            ${it.notes ? `<div class="ci-notes">"${it.notes}"</div>` : ""}
            <div class="ci-bottom">
              <div class="qty sm">
                <button class="dec" aria-label="Decrease">−</button>
                <span class="val">${it.qty}</span>
                <button class="inc" aria-label="Increase">+</button>
              </div>
              <div class="ci-price">${formatRM(Cart.unitPrice(it) * it.qty)}</div>
            </div>
            <div style="margin-top:6px"><button class="ci-remove">Remove</button></div>
          </div>
        </div>`;
    });

    // Show customer details + note only for walk-in
    if (!isOnline) {
      html += `
        <h3 style="margin:22px 0 10px;font-size:16px">Your details</h3>
        <div class="field">
          <label for="custName">Name <span style="color:var(--muted);font-weight:400">(so staff can call you)</span></label>
          <input id="custName" type="text" placeholder="e.g. Amirul" value="${localStorage.getItem('sz_name')||''}" />
        </div>
        <div class="field">
          <label for="orderNote">Note for the kitchen (optional)</label>
          <textarea id="orderNote" rows="2" placeholder="e.g. serve drinks first"></textarea>
        </div>`;
    }

    html += `
      <div class="summary">
        <div class="row"><span class="muted">Subtotal</span><span>${formatRM(Cart.subtotal())}</span></div>
        <div class="row"><span class="muted">SST (${(RESTAURANT.taxRate*100).toFixed(0)}%)</span><span>${formatRM(Cart.tax())}</span></div>
        <div class="row total"><span>Total</span><span>${formatRM(Cart.total())}</span></div>
      </div>
      ${!isOnline ? `<p style="text-align:center;color:var(--muted);font-size:12px;margin-top:14px">Your order will be sent straight to the kitchen.</p>` : ""}`;

    pageEl.innerHTML = html;

    // Update footer button label
    const placeBtn = document.getElementById("placeBtn");
    placeBtn.innerHTML = isOnline
      ? `Proceed to Checkout · <span id="footTotal">${formatRM(Cart.total())}</span>`
      : `Proceed to Payment · <span id="footTotal">${formatRM(Cart.total())}</span>`;

    footerEl.style.display = "block";
  }

  /* Quantity + remove (event delegation) */
  pageEl.addEventListener("click", (e) => {
    const row = e.target.closest(".cart-item");
    if (!row) return;
    const sig = decodeURIComponent(row.dataset.sig);
    const it = Cart.get().find(i => Cart.signature(i) === sig);
    if (!it) return;

    if (e.target.closest(".inc"))           Cart.setQty(sig, it.qty + 1);
    else if (e.target.closest(".dec"))      Cart.setQty(sig, it.qty - 1);
    else if (e.target.closest(".ci-remove")) { Cart.remove(sig); toast("Item removed"); }
    else return;
    render();
  });

  /* Place order button */
  document.getElementById("footer").addEventListener("click", async (e) => {
    if (!e.target.closest("#placeBtn")) return;
    if (!Cart.count()) { toast("Your cart is empty"); return; }

    const btn = document.getElementById("placeBtn");
    btn.disabled = true;

    if (Table.get()) {
      // Dine-in: collect name/note, then go to the payment step.
      // The order is only placed after the customer picks how to pay
      // (pay at counter or pay online) on payment.html.
      const name = (document.getElementById("custName")?.value || "").trim();
      const note = (document.getElementById("orderNote")?.value || "").trim();
      if (name) localStorage.setItem("sz_name", name);
      localStorage.setItem("sz_table_info", JSON.stringify({ name, note }));

      location.href = "payment.html";
    } else {
      // Online: keep cart, go to checkout
      location.href = "checkout.html";
    }
  });

  render();
  </script>
</body>
</html>
