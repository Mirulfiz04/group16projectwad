<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#d6342b" />
  <title>Order Confirmed — Sup Tulang ZZ</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Success animation */
    .confirm-hero { text-align: center; padding: 32px 20px 24px; }
    .check-circle {
      width: 72px; height: 72px; border-radius: 50%;
      background: #e8f5e9; display: inline-flex;
      align-items: center; justify-content: center;
      font-size: 36px; margin-bottom: 14px;
      animation: pop .4s cubic-bezier(.175,.885,.32,1.275);
    }
    @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .confirm-hero h1 { font-size: 22px; margin: 0 0 6px; color: #2e7d32; }
    .confirm-hero p  { font-size: 14px; color: var(--muted); margin: 0; }

    /* Order ID card */
    .order-id-card {
      background: #fff8f8; border: 1px solid #f0c0c0;
      border-radius: 14px; padding: 16px; text-align: center; margin-bottom: 20px;
    }
    .order-id-card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .order-id-card .oid   { font-size: 28px; font-weight: 800; color: var(--red); margin: 4px 0; }

    /* Email notice */
    .email-notice {
      display: flex; align-items: center; gap: 10px;
      background: #e8f5e9; border-radius: 10px; padding: 12px 14px;
      font-size: 13px; color: #2e7d32; margin-bottom: 20px;
    }
    .email-notice .icon { font-size: 20px; flex-shrink: 0; }

    /* Summary */
    .section { margin-bottom: 20px; }
    .section h3 { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin: 0 0 10px; }
    .summary-card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 14px; }
    .s-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
    .s-row:last-child { margin-bottom: 0; }
    .s-row.total { font-weight: 800; font-size: 16px; border-top: 1px dashed var(--line); padding-top: 10px; margin-top: 4px; }
    .s-row .muted { color: var(--muted); }

    /* Actions */
    .actions { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <span></span>
      <div class="title">Order Confirmed</div>
      <span></span>
    </header>

    <main class="page" id="page">
      <p style="text-align:center;padding:40px 0;color:var(--muted)">Loading…</p>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script>
  const pageEl = document.getElementById("page");

  function fmtDateTime(str) {
    if (!str) return "";
    return new Date(str).toLocaleString("en-MY", {
      day: "2-digit", month: "short", year: "numeric",
      hour: "2-digit", minute: "2-digit",
    });
  }

  function render() {
    const order   = JSON.parse(localStorage.getItem("sz_online_order") || "null");
    const payment = JSON.parse(localStorage.getItem("sz_payment")       || "null");

    if (!order) {
      pageEl.innerHTML = `
        <div class="empty">
          <div class="big">🧾</div>
          <p>No order found.</p>
          <a class="btn" href="menu.html">Back to Menu</a>
        </div>`;
      return;
    }

    const items = order.items || [];
    const methodLabel = payment
      ? (payment.method === "fpx" ? "🏦 " + payment.detail + " (FPX)" : "📱 " + payment.detail)
      : "—";
    const paidAt = payment ? payment.paid_at : null;

    let itemRows = items.map(it => {
      const label = it.variant_name || (it.variant ? it.variant.name : null);
      const price = (it.unit_price || Cart.unitPrice(it)) * it.qty;
      return `<div class="s-row"><span>${it.qty}× ${it.name}${label ? " ("+label+")" : ""}</span><span>${formatRM(price)}</span></div>`;
    }).join("");

    const deliveryLine = order.delivery_type === "pickup"
      ? "Self Pickup"
      : (order.address || "Delivery");

    pageEl.innerHTML = `
      <div class="confirm-hero">
        <div class="check-circle">✅</div>
        <h1>Order Confirmed!</h1>
        <p>Your order has been placed and is being prepared.</p>
      </div>

      <div class="order-id-card">
        <div class="label">Order ID</div>
        <div class="oid">#${order.id}</div>
        ${paidAt ? `<div style="font-size:12px;color:var(--muted)">${fmtDateTime(paidAt)}</div>` : ""}
      </div>

      <div class="email-notice">
        <span class="icon">📧</span>
        <span>A confirmation email has been sent to <strong>${order.customer_email || "your email"}</strong>.</span>
      </div>

      <div class="section">
        <h3>Order Summary</h3>
        <div class="summary-card">
          ${itemRows}
          <div class="s-row"><span class="muted">Subtotal</span><span>${formatRM(order.subtotal)}</span></div>
          <div class="s-row"><span class="muted">SST (6%)</span><span>${formatRM(order.tax)}</span></div>
          <div class="s-row total"><span>Total</span><span>${formatRM(order.total)}</span></div>
        </div>
      </div>

      <div class="section">
        <h3>Details</h3>
        <div class="summary-card">
          <div class="s-row"><span class="muted">Name</span><span>${order.customer_name || "—"}</span></div>
          <div class="s-row"><span class="muted">Delivery</span><span>${deliveryLine}</span></div>
          <div class="s-row"><span class="muted">Payment</span><span>${methodLabel}</span></div>
          <div class="s-row"><span class="muted">Status</span>
            <span class="status-pill ${order.status || "pending"}">${order.status || "Pending"}</span>
          </div>
        </div>
      </div>

      <div class="actions">
        <a class="btn" href="tracking.html">Track My Order →</a>
        <a class="btn secondary" href="menu.html">Back to Menu</a>
      </div>
    `;
  }

  render();
  </script>
</body>
</html>
