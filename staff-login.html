<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#d6342b" />
  <title>Staff Login — Sup Tulang ZZ</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { background: var(--bg); }
    .login-wrap {
      min-height: 100vh; display: flex;
      flex-direction: column; align-items: center;
      justify-content: center; padding: 24px; box-sizing: border-box;
    }
    .login-card {
      width: 100%; max-width: 380px; background: #fff;
      border: 1px solid var(--line); border-radius: 18px;
      padding: 32px 28px; box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .login-head { text-align: center; margin-bottom: 28px; }
    .login-head .logo { font-size: 40px; }
    .login-head h1 { font-size: 20px; margin: 8px 0 4px; }
    .login-head p  { font-size: 13px; color: var(--muted); margin: 0; }
    .field { margin-bottom: 16px; }
    .field label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px; }
    .field input {
      width: 100%; box-sizing: border-box; padding: 12px 14px;
      border-radius: 10px; border: 1.5px solid var(--line);
      font-size: 15px; background: #fafafa;
    }
    .field input:focus { outline: none; border-color: var(--red); background: #fff; }
    .err-msg {
      background: #fff0f0; border: 1px solid #f5c0c0; color: #c0392b;
      border-radius: 8px; padding: 10px 14px; font-size: 13px;
      margin-bottom: 14px; display: none;
    }
    .creds-hint {
      background: #f8f8f8; border: 1px solid var(--line); border-radius: 10px;
      padding: 12px 14px; font-size: 12px; color: var(--muted);
      margin-bottom: 20px; line-height: 1.8;
    }
    .creds-hint strong { color: #333; }
    .login-footer { text-align: center; margin-top: 20px; font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-head">
        <div class="logo">🍲</div>
        <h1>Staff Login</h1>
        <p>Sup Tulang ZZ · Kitchen &amp; Waiter</p>
      </div>

      <div class="creds-hint">
        <strong>Kitchen:</strong> kitchen@suptulangzz.com / password<br>
        <strong>Waiter:</strong> waiter@suptulangzz.com / password
      </div>

      <div class="err-msg" id="errMsg">Invalid email or password.</div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="staff@suptulangzz.com" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••" />
      </div>

      <button class="btn" id="loginBtn">Log In</button>

      <div class="login-footer">
        <a href="index.html" style="color:var(--muted)">← Back to main site</a>
      </div>
    </div>
  </div>

  <script>
  // If already logged in, go straight to kitchen
  const saved = localStorage.getItem("sz_staff");
  if (saved) location.href = "kitchen.html";

  document.getElementById("password").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("loginBtn").click();
  });

  document.getElementById("loginBtn").addEventListener("click", async () => {
    const btn      = document.getElementById("loginBtn");
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const errMsg   = document.getElementById("errMsg");

    if (!email || !password) {
      errMsg.textContent = "Please enter your email and password.";
      errMsg.style.display = "block";
      return;
    }

    btn.disabled = true;
    btn.textContent = "Logging in…";
    errMsg.style.display = "none";

    try {
      const r = await fetch("api/staff_auth.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "login", email, password }),
      });
      const j = await r.json();

      if (j && j.ok) {
        localStorage.setItem("sz_staff", JSON.stringify({ role: j.role, name: j.name }));
        location.href = "kitchen.html";
      } else {
        errMsg.textContent = "Invalid email or password.";
        errMsg.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Log In";
      }
    } catch (e) {
      errMsg.textContent = "Cannot reach server. Make sure XAMPP is running.";
      errMsg.style.display = "block";
      btn.disabled = false;
      btn.textContent = "Log In";
    }
  });
  </script>
</body>
</html>
